<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: "ML/LLM Documentation" }}</title>

    <!-- MathJax for formulas -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [["$", "$"]],
          displayMath: [["$$", "$$"]],
          processEscapes: true,
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #24292f;
        background: #f6f8fa;
      }

      /* Layout Container */
      .docs-container {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar Styles */
      .sidebar {
        width: 300px;
        background: #ffffff;
        border-right: 1px solid #e1e4e8;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        overflow-y: auto;
        padding: 20px 0;
        z-index: 100;
      }

      .sidebar-header {
        padding: 0 20px 20px 20px;
        border-bottom: 1px solid #e1e4e8;
        margin-bottom: 20px;
      }

      .sidebar-header h2 {
        font-size: 1.3rem;
        color: #0969da;
      }

      .sidebar-header p {
        font-size: 0.8rem;
        color: #57606a;
        margin-top: 5px;
      }

      /* Accordion Styles */
      .nav-section {
        margin-bottom: 10px;
      }

      .nav-section-header {
        padding: 10px 20px;
        cursor: pointer;
        font-weight: 600;
        color: #24292f;
        background: #ffffff;
        transition: background 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
      }

      .nav-section-header:hover {
        background: #f3f4f6;
      }

      .nav-section-header .arrow {
        transition: transform 0.2s;
        font-size: 0.75rem;
        color: #57606a;
      }

      .nav-section-header.active .arrow {
        transform: rotate(90deg);
      }

      .nav-section-content {
        display: none;
        padding-left: 15px;
      }

      .nav-section-content.show {
        display: block;
      }

      .nav-subsection {
        margin-left: 15px;
        margin-top: 5px;
      }

      .nav-subsection-header {
        padding: 8px 20px 8px 35px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        color: #57606a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-subsection-header:hover {
        background: #f3f4f6;
      }

      .nav-subsection-header .arrow {
        font-size: 0.7rem;
        transition: transform 0.2s;
      }

      .nav-subsection-header.active .arrow {
        transform: rotate(90deg);
      }

      .nav-subsection-content {
        display: none;
        padding-left: 20px;
      }

      .nav-subsection-content.show {
        display: block;
      }

      .nav-item {
        padding: 6px 20px 6px 50px;
        font-size: 0.85rem;
        color: #57606a;
        text-decoration: none;
        display: block;
        transition: all 0.2s;
        border-radius: 6px;
        margin: 2px 8px;
      }

      .nav-item:hover {
        background: #f0f2f4;
        color: #0969da;
      }

      .nav-item.active {
        background: #ddf4ff;
        color: #0969da;
        font-weight: 500;
      }

      /* Main Content Area */
      .main-content {
        margin-left: 300px;
        flex: 1;
        padding: 40px 60px;
        background: #ffffff;
        min-height: 100vh;
      }

      .content-wrapper {
        max-width: 900px;
        margin: 0 auto;
      }

      /* Mobile Toggle Button */
      .menu-toggle {
        display: none;
        position: fixed;
        top: 15px;
        left: 15px;
        background: #0969da;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        z-index: 200;
        font-size: 1.2rem;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
          transition: transform 0.3s ease;
          width: 280px;
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .main-content {
          margin-left: 0;
          padding: 20px;
        }

        .menu-toggle {
          display: block;
        }
      }

      /* Markdown Content Styling */
      .markdown-body {
        font-size: 1rem;
      }

      .markdown-body h1 {
        border-bottom: 1px solid #e1e4e8;
        padding-bottom: 0.3em;
      }

      .markdown-body h2 {
        border-bottom: 1px solid #e1e4e8;
        padding-bottom: 0.3em;
        margin-top: 24px;
      }

      .markdown-body code {
        background: #f6f8fa;
        padding: 0.2em 0.4em;
        border-radius: 6px;
      }

      .markdown-body pre {
        background: #f6f8fa;
        border-radius: 6px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <button class="menu-toggle" onclick="toggleSidebar()">☰ Menu</button>

    <div class="docs-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>🧠 ML/LLM Docs</h2>
          <p>Machine Learning & Large Language Models</p>
        </div>

        <nav id="navigation">
          <!-- JavaScript will populate navigation here -->
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <div class="content-wrapper markdown-body">{{ content }}</div>
      </main>
    </div>

      // Article titles for each subdomain

        ],
        "domain-03-deep-learning-foundations/02-training-neural-networks": [

        ],
        "domain-07-practical-aspects/01-data-processing": [
          "01-data-collection",
          "02-cleaning-preprocessing",
          "03-data-augmentation",

          "05-imbalanced-data",

        ],
        "domain-07-practical-aspects/02-evaluation-metrics": [
          "01-perplexity",
          "02-bleu-score",
          "03-rouge-score",
          "04-bertscore",
          "05-human-evaluation",
          "06-benchmark-datasets",

        ],
        "domain-07-practical-aspects/03-deployment-optimization": [
          "01-model-compression",
          "02-quantization",
          "03-pruning",
          "04-distillation",
          "05-kv-caching",
          "06-continuous-batching",

      // Format article name for display
      function formatArticleName(filename) {
        return filename
          .replace(/^\d+-/, "")
          .replace(/-/g, " ")
          .replace(/\b\w/g, (l) => l.toUpperCase());
      }

      // Generate navigation HTML
      function generateNavigation() {
        const nav = document.getElementById("navigation");
        if (!nav) return;

        let html = "";
        const currentPath = window.location.pathname;

        for (const domain of navigationData) {
          html += `<div class="nav-section">`;
          html += `<div class="nav-section-header" onclick="toggleSection(this)">`;
          html += `<span>📁 ${domain.name}</span>`;
          html += `<span class="arrow">▶</span>`;
          html += `</div>`;
          html += `<div class="nav-section-content">`;

          for (const subsection of domain.subsections) {
            const subsectionPath = `/${subsection.path}/`;
            const isActiveSubsection = currentPath.includes(subsection.path);

            html += `<div class="nav-subsection">`;
            html += `<div class="nav-subsection-header" onclick="toggleSubsection(this)">`;
            html += `<span>📂 ${subsection.name}</span>`;
            html += `<span class="arrow">▶</span>`;
            html += `</div>`;
            html += `<div class="nav-subsection-content">`;

            // Get articles for this subdomain
            const articles = articlesData[subsection.path] || [];
            for (const article of articles) {
              const articlePath = `/${subsection.path}/${article}.md`;
              const isActive = currentPath === articlePath;
              const activeClass = isActive ? "active" : "";
              html += `<a href="${articlePath}" class="nav-item ${activeClass}">📄 ${formatArticleName(article)}</a>`;
            }

            html += `</div>`; // Close subsection content
            html += `</div>`; // Close subsection
          }

          html += `</div>`; // Close section content
          html += `</div>`; // Close section
        }

        nav.innerHTML = html;
      }

      // Toggle section (domain)
      function toggleSection(element) {
        element.classList.toggle("active");
        const content = element.nextElementSibling;
        content.classList.toggle("show");
      }

      // Toggle subsection
      function toggleSubsection(element) {
        element.classList.toggle("active");
        const content = element.nextElementSibling;
        content.classList.toggle("show");
      }

      // Toggle mobile sidebar
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("open");
      }

      // Close sidebar when clicking a link on mobile
      document.addEventListener("click", function (e) {
        if (
          window.innerWidth <= 768 &&
          e.target.classList.contains("nav-item")
        ) {
          document.getElementById("sidebar").classList.remove("open");
        }
      });

      // Generate navigation when page loads
      document.addEventListener("DOMContentLoaded", generateNavigation);
    </script>
  </body>
</html>
