<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{{ page.title | default: "ML/LLM Documentation" }}</title>

    <!-- CRITICAL: MathJax MUST be here directly -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
          processEscapes: true,
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <!-- Primer theme CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css"
    />
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 20px;
      }
    </style>
  </head>
  <body class="markdown-body">
    {{ content }}
  </body>
</html>
